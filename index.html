<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI バトルロワイヤル</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
  :root {
    --bg:#0a0a12;--surface:#13131e;--surface2:#1a1a28;--border:rgba(255,255,255,0.07);
    --accent:#a78bfa;--accent2:#f97316;--text:#e2e2f0;--muted:#7777aa;
    --gold:#fbbf24;--radius:14px;--font:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:0 0 60px;overflow-x:hidden;}

  /* ヒーローバナー */
  .hero{width:100%;max-width:600px;padding:32px 16px 0;text-align:center;position:relative;}
  .hero-canvas{display:block;width:100%;height:180px;border-radius:16px;margin-bottom:16px;}
  .hero h1{font-size:clamp(24px,6vw,40px);font-weight:800;letter-spacing:.04em;
    background:linear-gradient(135deg,#c4b5fd,#f97316,#fbbf24);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:6px;text-shadow:none;}
  .hero p{color:var(--muted);font-size:13px;margin-bottom:24px;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:24px;width:100%;max-width:540px;margin-bottom:14px;}
  .card h2{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--accent);
    display:flex;align-items:center;gap:8px;}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;margin-top:14px;}
  label:first-of-type{margin-top:0;}
  input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;padding:10px 12px;
    outline:none;transition:border-color .2s;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:90px;}
  .btn{display:block;width:100%;padding:13px;border-radius:10px;border:none;
    font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;
    transition:opacity .2s,transform .1s;margin-top:18px;letter-spacing:.03em;}
  .btn:hover{opacity:.88;}.btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;}
  .btn-danger{background:linear-gradient(135deg,var(--accent2),#dc2626);color:#fff;}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}

  .players-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .player-chip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:10px 12px;font-size:13px;transition:border-color .3s;}
  .player-chip .pname{font-weight:600;color:var(--text);}
  .player-chip .status{font-size:11px;color:var(--muted);margin-top:3px;}
  .player-chip.ready{border-color:rgba(74,222,128,.4);}
  .player-chip.ready .status{color:#4ade80;}
  .player-chip.empty .pname{color:var(--muted);font-weight:400;}

  .room-code{background:var(--surface2);border:1px solid rgba(167,139,250,.3);border-radius:10px;
    padding:14px;font-size:32px;font-weight:800;letter-spacing:.25em;text-align:center;
    color:var(--accent);margin-bottom:10px;}
  .hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.7;}

  /* バトルログ */
  #battle-log{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:18px;font-size:14px;line-height:2.1;white-space:pre-wrap;margin-top:16px;
    min-height:140px;max-height:480px;overflow-y:auto;color:var(--text);}

  /* 結果 */
  .rank-item{display:flex;align-items:center;gap:12px;padding:13px 16px;
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    margin-bottom:8px;transition:border-color .2s;}
  .rank-item.rank-1{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.06);}
  .rank-item.rank-2{border-color:rgba(148,163,184,.4);}
  .rank-item.rank-3{border-color:rgba(205,124,74,.4);}
  .rank-medal{font-size:24px;min-width:32px;text-align:center;}

  /* バトル中アニメ */
  .battle-arena{width:100%;height:160px;border-radius:12px;display:block;margin-bottom:16px;}
  .loading-dots span{animation:blink 1.2s infinite;opacity:0;}
  .loading-dots span:nth-child(2){animation-delay:.2s;}
  .loading-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

  .phase{display:none;}.phase.active{display:block;}
  .tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;
    font-weight:700;letter-spacing:.05em;vertical-align:middle;margin-left:6px;}
  .tag-host{background:rgba(167,139,250,.2);color:var(--accent);}

  .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
  .card,.hero{position:relative;z-index:1;}
</style>
</head>
<body>

<canvas class="particles" id="particles"></canvas>

<div class="hero">
  <canvas class="hero-canvas" id="hero-canvas"></canvas>
  <h1>⚔️ AI バトルロワイヤル</h1>
  <p>キャラを作って、AIに戦わせよう</p>
</div>

<!-- PHASE 0 -->
<div id="phase-setup" class="phase active card">
  <h2>⚙️ ゲーム設定</h2>
  <label>あなたの名前</label>
  <input type="text" id="input-myname" placeholder="プレイヤー名" maxlength="16">
  <label>参加人数（ホストのみ設定）</label>
  <select id="input-maxplayers">
    <option value="2">2人</option>
    <option value="3" selected>3人</option>
    <option value="4">4人</option>
  </select>
  <button class="btn btn-primary" id="btn-create">✨ ルームを作成してホストになる</button>
  <button class="btn btn-ghost" id="btn-join-init" style="margin-top:10px">🔑 ルームコードで参加する</button>
  <div id="join-form" style="display:none;margin-top:14px;">
    <label>ルームコード（4桁）</label>
    <input type="text" id="input-roomcode" placeholder="例: 4829" maxlength="4"
      style="letter-spacing:.25em;font-size:22px;text-align:center;">
    <button class="btn btn-ghost" id="btn-join" style="margin-top:10px">参加する →</button>
  </div>
</div>

<!-- PHASE 1 -->
<div id="phase-char" class="phase card">
  <h2>🧙 キャラクターを作ろう <span id="host-tag"></span></h2>
  <div class="room-code" id="display-roomcode">----</div>
  <p class="hint">このコードを仲間に教えてください<br>全員が確定したらホストがバトルを開始できます</p>
  <div style="margin-top:20px;">
    <label>キャラクター名</label>
    <input type="text" id="char-name" placeholder="例: 闇の魔術師ザルーク" maxlength="20">
    <label>特徴・能力・性格（自由に書いてください）</label>
    <textarea id="char-desc" placeholder="例：炎を操る元王国の魔術師。プライドが高く冷静だが、仲間を傷つけられると激昂する。必殺技は「炎の柩」。体力は低めだが魔力は最高峰。"></textarea>
  </div>
  <button class="btn btn-primary" id="btn-submit-char">このキャラで参加確定！</button>
  <div style="margin-top:20px;">
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">参加状況</div>
    <div class="players-grid" id="players-status"></div>
  </div>
  <button class="btn btn-danger" id="btn-start-battle" style="display:none;margin-top:20px;">
    ⚔️ 全員そろった！バトル開始！
  </button>
</div>

<!-- PHASE 2 -->
<div id="phase-battle" class="phase card">
  <canvas class="battle-arena" id="battle-canvas"></canvas>
  <h2>⚔️ バトル中<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></h2>
  <p style="font-size:13px;color:var(--muted);margin-bottom:4px;">AIがバトルを生成しています。しばらくお待ちください。</p>
  <div id="battle-log">生成中です...</div>
</div>

<!-- PHASE 3 -->
<div id="phase-result" class="phase card">
  <h2>🏆 バトル結果</h2>
  <div id="rank-list" style="margin-top:12px;"></div>
  <div style="margin-top:20px;">
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">バトル詳細</div>
    <div id="battle-log-result" style="background:var(--surface2);border:1px solid var(--border);
      border-radius:10px;padding:16px;font-size:13px;line-height:2.1;white-space:pre-wrap;
      max-height:420px;overflow-y:auto;"></div>
  </div>
  <button class="btn btn-ghost" id="btn-replay" style="margin-top:20px;">🔄 もう一度遊ぶ</button>
</div>

<script>
// ══════════════════════════════════════
//  Firebase
// ══════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyDmtiPcQfFDRDK8DcOg2k6Tlqgk1wcS9VE",
  databaseURL:"https://kumamodoki-games-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"kumamodoki-games",
  appId:"1:679874027550:web:4293f1a18d2a2a5c2b0e0f",
  authDomain:"kumamodoki-games.firebaseapp.com",
});
const db = firebase.database();

let state = {
  roomCode:null,isHost:false,myName:'',
  myId:'p_'+Math.random().toString(36).slice(2,8),maxPlayers:3
};

function showPhase(n){
  document.querySelectorAll('.phase').forEach(el=>el.classList.remove('active'));
  document.getElementById('phase-'+n).classList.add('active');
}
function genCode(){return String(Math.floor(1000+Math.random()*9000));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ══════════════════════════════════════
//  ヒーローキャンバス描画（モンスター群）
// ══════════════════════════════════════
const heroCanvas = document.getElementById('hero-canvas');
const hctx = heroCanvas.getContext('2d');
heroCanvas.width = heroCanvas.offsetWidth * devicePixelRatio || 600;
heroCanvas.height = 180 * devicePixelRatio;
hctx.scale(devicePixelRatio, devicePixelRatio);
const HW = heroCanvas.offsetWidth || 540, HH = 180;

const creatures = [
  {x:60,  y:90,  type:'dragon',  color:'#a78bfa', size:1.1, speed:0.3, t:0},
  {x:160, y:100, type:'knight',  color:'#60a5fa', size:0.9, speed:0.4, t:1},
  {x:270, y:85,  type:'wizard',  color:'#f97316', size:1.0, speed:0.35,t:2},
  {x:380, y:95,  type:'monster', color:'#4ade80', size:0.95,speed:0.45,t:0.5},
  {x:470, y:88,  type:'dragon',  color:'#fbbf24', size:0.85,speed:0.38,t:1.5},
];

function drawDragon(ctx, x, y, s, color, t) {
  const bob = Math.sin(t*2)*4;
  ctx.save(); ctx.translate(x, y+bob); ctx.scale(s,s);
  // 体
  ctx.fillStyle = color; ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.ellipse(0,0,22,14,0,0,Math.PI*2); ctx.fill();
  // 頭
  ctx.beginPath(); ctx.ellipse(26,0,12,10,0.2,0,Math.PI*2); ctx.fill();
  // 目
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(31,-2,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(32,-2,1.5,0,Math.PI*2); ctx.fill();
  // 翼
  ctx.fillStyle=color; ctx.globalAlpha=0.6;
  ctx.beginPath(); ctx.moveTo(-5,-14); ctx.quadraticCurveTo(-30,-40,-10,-10); ctx.fill();
  ctx.beginPath(); ctx.moveTo(5,-14); ctx.quadraticCurveTo(30,-40,10,-10); ctx.fill();
  // しっぽ
  ctx.globalAlpha=0.8; ctx.strokeStyle=color; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-22,0); ctx.quadraticCurveTo(-40,10,-44,4); ctx.stroke();
  ctx.restore();
}

function drawKnight(ctx, x, y, s, color, t) {
  const bob = Math.sin(t*2+1)*3;
  ctx.save(); ctx.translate(x, y+bob); ctx.scale(s,s);
  ctx.globalAlpha=0.9;
  // 体
  ctx.fillStyle=color;
  ctx.fillRect(-10,-20,20,24);
  // 頭（兜）
  ctx.beginPath(); ctx.arc(0,-26,12,Math.PI,0); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-7,-30,14,10);
  // 剣
  ctx.fillStyle='#94a3b8'; ctx.fillRect(14,-30,4,36);
  ctx.fillStyle='#fbbf24'; ctx.fillRect(10,-14,12,4);
  // 盾
  ctx.fillStyle=color+'cc';
  ctx.beginPath(); ctx.moveTo(-14,-20); ctx.lineTo(-24,-10); ctx.lineTo(-20,8); ctx.lineTo(-14,8); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawWizard(ctx, x, y, s, color, t) {
  const bob = Math.sin(t*2+2)*3;
  const glow = Math.abs(Math.sin(t*3));
  ctx.save(); ctx.translate(x, y+bob); ctx.scale(s,s);
  // 魔法陣
  ctx.globalAlpha=glow*0.3; ctx.strokeStyle=color; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.9;
  // ローブ
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.moveTo(-12,-10); ctx.lineTo(-16,20); ctx.lineTo(16,20); ctx.lineTo(12,-10); ctx.closePath(); ctx.fill();
  // 頭
  ctx.beginPath(); ctx.arc(0,-18,10,0,Math.PI*2); ctx.fill();
  // とんがり帽子
  ctx.beginPath(); ctx.moveTo(0,-44); ctx.lineTo(-12,-18); ctx.lineTo(12,-18); ctx.closePath(); ctx.fill();
  // 杖
  ctx.strokeStyle='#92400e'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(16,-20); ctx.lineTo(20,20); ctx.stroke();
  // 杖先の光
  ctx.fillStyle='#fff'; ctx.globalAlpha=glow*0.9;
  ctx.beginPath(); ctx.arc(16,-22,5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawMonster(ctx, x, y, s, color, t) {
  const bob = Math.sin(t*2.5)*4;
  ctx.save(); ctx.translate(x, y+bob); ctx.scale(s,s);
  ctx.globalAlpha=0.9;
  // 体
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.ellipse(0,5,18,20,0,0,Math.PI*2); ctx.fill();
  // 頭
  ctx.beginPath(); ctx.ellipse(0,-16,16,14,0,0,Math.PI*2); ctx.fill();
  // 目（複数）
  [-6,0,6].forEach(ex=>{
    ctx.fillStyle='#ff0000'; ctx.beginPath(); ctx.arc(ex,-17,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(ex,-17,1.5,0,Math.PI*2); ctx.fill();
  });
  // 牙
  ctx.fillStyle='#fff';
  [-6,-2,2,6].forEach(tx=>{
    ctx.beginPath(); ctx.moveTo(tx,-6); ctx.lineTo(tx-2,2); ctx.lineTo(tx+2,2); ctx.closePath(); ctx.fill();
  });
  // 腕
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.ellipse(-26,4,8,14,0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(26,4,8,14,-0.4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCreature(ctx, c) {
  switch(c.type) {
    case 'dragon':  drawDragon(ctx,c.x,c.y,c.size,c.color,c.t); break;
    case 'knight':  drawKnight(ctx,c.x,c.y,c.size,c.color,c.t); break;
    case 'wizard':  drawWizard(ctx,c.x,c.y,c.size,c.color,c.t); break;
    case 'monster': drawMonster(ctx,c.x,c.y,c.size,c.color,c.t); break;
  }
}

function animateHero() {
  hctx.clearRect(0,0,HW,HH);
  // 背景グラデ
  const grad = hctx.createLinearGradient(0,0,HW,HH);
  grad.addColorStop(0,'#0a0a1a'); grad.addColorStop(1,'#1a0a2a');
  hctx.fillStyle=grad; hctx.fillRect(0,0,HW,HH);
  // 星
  hctx.fillStyle='rgba(255,255,255,0.6)';
  [[40,20],[120,35],[200,15],[310,28],[420,12],[500,30],[80,55],[350,48]].forEach(([sx,sy])=>{
    hctx.beginPath(); hctx.arc(sx,sy,1,0,Math.PI*2); hctx.fill();
  });
  // 地面
  const gnd = hctx.createLinearGradient(0,130,0,HH);
  gnd.addColorStop(0,'rgba(167,139,250,0.15)'); gnd.addColorStop(1,'rgba(167,139,250,0.05)');
  hctx.fillStyle=gnd; hctx.fillRect(0,130,HW,HH-130);
  // クリーチャー
  creatures.forEach(c => { c.t += 0.02; drawCreature(hctx,c); });
  // エフェクト（稲妻）
  const lt = Math.sin(Date.now()/300);
  if(lt>0.97){
    hctx.strokeStyle='rgba(167,139,250,0.8)'; hctx.lineWidth=2;
    hctx.beginPath(); hctx.moveTo(HW/2,0);
    hctx.lineTo(HW/2-10,40); hctx.lineTo(HW/2+8,70); hctx.lineTo(HW/2-5,HH);
    hctx.stroke();
  }
  requestAnimationFrame(animateHero);
}
animateHero();

// ══════════════════════════════════════
//  バトル中アニメ
// ══════════════════════════════════════
let battleAnimId = null;
function startBattleAnim(playerNames) {
  const bc = document.getElementById('battle-canvas');
  const bctx = bc.getContext('2d');
  bc.width = bc.offsetWidth * devicePixelRatio || 500;
  bc.height = 160 * devicePixelRatio;
  bctx.scale(devicePixelRatio, devicePixelRatio);
  const BW = bc.offsetWidth || 500, BH = 160;

  const colors = ['#a78bfa','#f97316','#4ade80','#60a5fa','#fbbf24'];
  const fighters = playerNames.map((name,i)=>({
    x: 60 + i*(BW-80)/(Math.max(playerNames.length-1,1)),
    y: 90, t: i*0.8,
    type: ['dragon','knight','wizard','monster','dragon'][i%5],
    color: colors[i%colors.length],
    size: 0.85, name,
    vx: (Math.random()-0.5)*0.5,
  }));

  // パーティクル
  const sparks = Array.from({length:20},()=>({
    x:Math.random()*BW, y:Math.random()*BH,
    vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2,
    life:Math.random(), color:colors[Math.floor(Math.random()*colors.length)]
  }));

  function frame(){
    bctx.clearRect(0,0,BW,BH);
    const bg = bctx.createLinearGradient(0,0,BW,BH);
    bg.addColorStop(0,'#0a0a1a'); bg.addColorStop(1,'#1a0820');
    bctx.fillStyle=bg; bctx.fillRect(0,0,BW,BH);

    // スパーク
    sparks.forEach(sp=>{
      sp.x+=sp.vx; sp.y+=sp.vy; sp.life-=0.01;
      if(sp.life<=0){sp.x=Math.random()*BW;sp.y=Math.random()*BH;sp.life=1;}
      bctx.fillStyle=sp.color; bctx.globalAlpha=sp.life*0.7;
      bctx.beginPath(); bctx.arc(sp.x,sp.y,2,0,Math.PI*2); bctx.fill();
    });
    bctx.globalAlpha=1;

    fighters.forEach(f=>{
      f.t+=0.025;
      f.x+=f.vx; if(f.x<40||f.x>BW-40) f.vx*=-1;
      drawCreature(bctx,f);
      // 名前
      bctx.fillStyle='rgba(255,255,255,0.7)'; bctx.font='10px sans-serif';
      bctx.textAlign='center'; bctx.fillText(f.name,f.x,f.y+36);
    });

    // VS テキスト
    bctx.fillStyle='rgba(249,115,22,0.8)';
    bctx.font='bold 18px sans-serif'; bctx.textAlign='center';
    bctx.fillText('VS',BW/2, BH/2+6);

    battleAnimId = requestAnimationFrame(frame);
  }
  frame();
}
function stopBattleAnim(){ if(battleAnimId) cancelAnimationFrame(battleAnimId); }

// ══════════════════════════════════════
//  パーティクル背景
// ══════════════════════════════════════
const pc = document.getElementById('particles');
const pctx = pc.getContext('2d');
pc.width = window.innerWidth; pc.height = window.innerHeight;
const pts = Array.from({length:40},()=>({
  x:Math.random()*pc.width, y:Math.random()*pc.height,
  vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
  r:Math.random()*1.5+.5,
  color:['#a78bfa','#7c3aed','#f97316','#4ade80'][Math.floor(Math.random()*4)]
}));
function animParts(){
  pctx.clearRect(0,0,pc.width,pc.height);
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=pc.width; if(p.x>pc.width)p.x=0;
    if(p.y<0)p.y=pc.height; if(p.y>pc.height)p.y=0;
    pctx.fillStyle=p.color; pctx.globalAlpha=0.4;
    pctx.beginPath(); pctx.arc(p.x,p.y,p.r,0,Math.PI*2); pctx.fill();
  });
  pctx.globalAlpha=1;
  requestAnimationFrame(animParts);
}
animParts();

// ══════════════════════════════════════
//  ゲームロジック
// ══════════════════════════════════════
document.getElementById('btn-create').addEventListener('click', async()=>{
  const name=document.getElementById('input-myname').value.trim();
  if(!name) return alert('名前を入力してください');
  state.isHost=true; state.myName=name;
  state.maxPlayers=parseInt(document.getElementById('input-maxplayers').value);
  state.roomCode=genCode();
  await db.ref('rooms/'+state.roomCode).set({maxPlayers:state.maxPlayers,phase:'waiting',createdAt:Date.now()});
  enterCharPhase();
});

document.getElementById('btn-join-init').addEventListener('click',()=>{
  document.getElementById('join-form').style.display='block';
});

document.getElementById('btn-join').addEventListener('click', async()=>{
  const name=document.getElementById('input-myname').value.trim();
  const code=document.getElementById('input-roomcode').value.trim();
  if(!name) return alert('名前を入力してください');
  if(code.length!==4) return alert('4桁のルームコードを入力してください');
  state.isHost=false; state.myName=name; state.roomCode=code;
  const snap=await db.ref('rooms/'+code).once('value');
  if(!snap.exists()) return alert('そのルームコードは存在しません');
  state.maxPlayers=snap.val().maxPlayers;
  enterCharPhase();
});

function enterCharPhase(){
  document.getElementById('display-roomcode').textContent=state.roomCode;
  document.getElementById('host-tag').innerHTML=state.isHost?'<span class="tag tag-host">ホスト</span>':'';
  showPhase('char'); listenPlayers();
}

function listenPlayers(){
  db.ref('rooms/'+state.roomCode+'/players').on('value',snap=>{
    renderPlayersStatus(snap.val()||{});
  });
  db.ref('rooms/'+state.roomCode+'/phase').on('value',snap=>{
    if(snap.val()==='battling'){
      if(!document.getElementById('phase-battle').classList.contains('active')){
        db.ref('rooms/'+state.roomCode+'/players').once('value',ps=>enterBattlePhase(ps.val()||{}));
      }
    }
    if(snap.val()==='done') fetchAndShowResult();
  });
}

function renderPlayersStatus(players){
  const grid=document.getElementById('players-status');
  grid.innerHTML='';
  const list=Object.values(players);
  for(let i=0;i<state.maxPlayers;i++){
    const p=list[i],chip=document.createElement('div');
    if(p){
      chip.className='player-chip'+(p.charName?' ready':'');
      chip.innerHTML=`<div class="pname">${esc(p.name)}</div><div class="status">${p.charName?'✓ '+esc(p.charName):'入力中...'}</div>`;
    }else{
      chip.className='player-chip empty';
      chip.innerHTML='<div class="pname">待機中...</div><div class="status">－</div>';
    }
    grid.appendChild(chip);
  }
  const allReady=list.length>=state.maxPlayers&&list.every(p=>p.charName);
  if(state.isHost) document.getElementById('btn-start-battle').style.display=allReady?'block':'none';
}

document.getElementById('btn-submit-char').addEventListener('click', async()=>{
  const charName=document.getElementById('char-name').value.trim();
  const charDesc=document.getElementById('char-desc').value.trim();
  if(!charName) return alert('キャラクター名を入力してください');
  if(!charDesc) return alert('特徴・能力を入力してください');
  await db.ref('rooms/'+state.roomCode+'/players/'+state.myId).set({
    id:state.myId,name:state.myName,charName,charDesc
  });
  document.getElementById('btn-submit-char').disabled=true;
  document.getElementById('btn-submit-char').textContent='確定済み ✓';
  document.getElementById('char-name').disabled=true;
  document.getElementById('char-desc').disabled=true;
});

document.getElementById('btn-start-battle').addEventListener('click', async()=>{
  await db.ref('rooms/'+state.roomCode+'/phase').set('battling');
  const snap=await db.ref('rooms/'+state.roomCode+'/players').once('value');
  enterBattlePhase(snap.val()||{});
});

async function enterBattlePhase(players){
  if(document.getElementById('phase-battle').classList.contains('active')) return;
  showPhase('battle');
  const names=Object.values(players).map(p=>p.charName||p.name);
  startBattleAnim(names);
  if(state.isHost) await runBattle(players);
}

async function runBattle(players){
  const log=document.getElementById('battle-log');
  log.textContent=''; let fullText='';
  try{
    const res=await fetch('/api/battle',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({players:Object.values(players)})
    });
    if(!res.ok){const e=await res.json();throw new Error(e.error||'サーバーエラー');}
    const reader=res.body.getReader(),decoder=new TextDecoder();
    while(true){
      const{done,value}=await reader.read(); if(done) break;
      for(const line of decoder.decode(value).split('\n')){
        if(!line.startsWith('data: ')) continue;
        const d=line.slice(6).trim(); if(d==='[DONE]') continue;
        try{const delta=JSON.parse(d).delta?.text||''; fullText+=delta; log.textContent=fullText; log.scrollTop=log.scrollHeight;}catch{}
      }
    }
    await db.ref('rooms/'+state.roomCode+'/result').set(fullText);
    await db.ref('rooms/'+state.roomCode+'/phase').set('done');
  }catch(e){
    log.textContent='⚠️ エラーが発生しました：'+e.message;
  }
}

async function fetchAndShowResult(){
  if(document.getElementById('phase-result').classList.contains('active')) return;
  stopBattleAnim();
  const snap=await db.ref('rooms/'+state.roomCode+'/result').once('value');
  showResult(snap.val()||'');
}

function showResult(fullText){
  showPhase('result');
  document.getElementById('battle-log-result').textContent=fullText;
  const jsonMatch=fullText.match(/```json\s*([\s\S]*?)```/);
  const rankList=document.getElementById('rank-list');
  rankList.innerHTML='';
  if(jsonMatch){
    try{
      const ranks=JSON.parse(jsonMatch[1].trim());
      const medals=['🥇','🥈','🥉'];
      ranks.sort((a,b)=>a.rank-b.rank).forEach(r=>{
        const item=document.createElement('div');
        item.className='rank-item rank-'+r.rank;
        item.innerHTML=`
          <span class="rank-medal">${medals[r.rank-1]||r.rank+'位'}</span>
          <span style="flex:1">
            <span style="font-size:16px;font-weight:700">${esc(r.name)}</span>
            <span style="font-size:12px;color:var(--muted);margin-left:8px">${esc(r.player)}</span>
          </span>
          <span style="font-size:12px;color:var(--muted);text-align:right;max-width:150px">${esc(r.comment||'')}</span>`;
        rankList.appendChild(item);
      });
    }catch{
      rankList.innerHTML='<p style="color:var(--muted);font-size:13px">順位データの解析に失敗しました</p>';
    }
  }
}

document.getElementById('btn-replay').addEventListener('click',()=>{
  if(state.roomCode) db.ref('rooms/'+state.roomCode).off();
  stopBattleAnim();
  state.roomCode=null; state.isHost=false;
  ['btn-submit-char','char-name','char-desc'].forEach(id=>{
    const el=document.getElementById(id);
    el.disabled=false;
    if(id==='btn-submit-char') el.textContent='このキャラで参加確定！';
    else el.value='';
  });
  document.getElementById('join-form').style.display='none';
  showPhase('setup');
});
</script>
</body>
